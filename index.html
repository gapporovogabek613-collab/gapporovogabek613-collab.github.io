<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Games</title>
<style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
}
button{
padding:15px;
margin:10px;
font-size:18px;
border-radius:10px;
}
canvas{
background:#111;
margin-top:20px;
}
</style>
</head>

<body>

<h1>🎮 Mini Games</h1>

<button onclick="startSnake()">🐍 Snake</button>
<button onclick="guessGame()">🔢 Guess Number</button>
<button onclick="clickGame()">⭐ Click Game</button>

<canvas id="game" width="300" height="300"></canvas>

<script>

let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

let snake=[];
let food={x:150,y:150};
let dx=10;
let dy=0;

function startSnake(){
snake=[{x:100,y:100}];
setInterval(drawSnake,100);
}

function drawSnake(){
ctx.clearRect(0,0,300,300);

let head={x:snake[0].x+dx,y:snake[0].y+dy};
snake.unshift(head);

if(head.x==food.x && head.y==food.y){
food.x=Math.floor(Math.random()*30)*10;
food.y=Math.floor(Math.random()*30)*10;
}else{
snake.pop();
}

ctx.fillStyle="red";
ctx.fillRect(food.x,food.y,10,10);

ctx.fillStyle="lime";
snake.forEach(p=>{
ctx.fillRect(p.x,p.y,10,10);
});
}

document.addEventListener("keydown",e=>{
if(e.key=="ArrowUp"){dx=0;dy=-10;}
if(e.key=="ArrowDown"){dx=0;dy=10;}
if(e.key=="ArrowLeft"){dx=-10;dy=0;}
if(e.key=="ArrowRight"){dx=10;dy=0;}
});

function guessGame(){
let n=Math.floor(Math.random()*10);
let g=prompt("0 dan 9 gacha son toping");
if(g==n){alert("To'g'ri!");}
else{alert("Xato. Son "+n);}
}

let score=0;

function clickGame(){
score++;
alert("⭐ Yulduz: "+score);
}

</script>

</body>
</html>

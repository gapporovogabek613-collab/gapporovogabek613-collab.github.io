<!DOCTYPE html>
<html>
<head>
<title>Mini Game</title>
<style>
body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}
button{
padding:20px;
font-size:20px;
}
</style>
</head>

<body>

<h1>🎮 Tugmani bos o‘yini</h1>
<p>Ball: <span id="score">0</span></p>

<button onclick="addScore()">BOS!</button>

<script>
let score = 0;

function addScore(){
score++;
document.getElementById("score").innerText = score;
}
</script>

</body>
</html>

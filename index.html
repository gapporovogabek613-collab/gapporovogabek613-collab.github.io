<!DOCTYPE html>
<html>
<head>
<title>UzBrainHub Mini Games</title>
<style>
body{
background:black;
color:white;
text-align:center;
font-family:sans-serif;
}
button{
background:#00e6c3;
border:none;
padding:12px;
margin:5px;
border-radius:8px;
}
</style>
</head>

<body>

<h1>🎮 UzBrainHub Mini Games</h1>

<button onclick="snake()">Snake</button>
<button onclick="clickGame()">Click Game</button>
<button onclick="guess()">Guess Number</button>
<button onclick="reaction()">Reaction Test</button>
<button onclick="dice()">Dice Roll</button>
<button onclick="coin()">Coin Flip</button>
<button onclick="color()">Color Change</button>
<button onclick="tap()">Tap Counter</button>
<button onclick="random()">Random Number</button>
<button onclick="joke()">Random Joke</button>

<script>

function snake(){
alert("🐍 Snake o'yini tez orada qo'shiladi");
}

function clickGame(){
let score=0;
while(confirm("OK bossangiz +1 ochko")){
score++;
alert("Score: "+score);
}
}

function guess(){
let n=Math.floor(Math.random()*10)+1;
let g=prompt("1 dan 10 gacha son toping");
if(g==n){
alert("🎉 To'g'ri topdingiz");
}else{
alert("❌ Xato. Javob: "+n);
}
}

function reaction(){
let start=Date.now();
alert("OK bosib tezlikni tekshiring");
let time=Date.now()-start;
alert("Sizning reaksiya: "+time+" ms");
}

function dice(){
let n=Math.floor(Math.random()*6)+1;
alert("🎲 Dice: "+n);
}

function coin(){
let r=Math.random();
if(r<0.5){
alert("🪙 Head");
}else{
alert("🪙 Tail");
}
}

function color(){
document.body.style.background=
"#"+Math.floor(Math.random()*16777215).toString(16);
}

let t=0;
function tap(){
t++;
alert("Tap: "+t);
}

function random(){
let n=Math.floor(Math.random()*100);
alert("Random number: "+n);
}

function joke(){
let jokes=[
"😂 Dasturchi choy ichadi, bug tuzatadi!",
"😂 Kompyuter uxlamaydi, lekin dasturchi uxlaydi",
"😂 1 bug ketadi, 2 bug keladi"
];
let j=jokes[Math.floor(Math.random()*jokes.length)];
alert(j);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Ogabek Game Hub</title>
<style>
body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}
button{
padding:15px;
margin:5px;
font-size:16px;
}
#game{
margin-top:20px;
}
</style>
</head>

<body>

<h1>🎮 Ogabek Game Hub</h1>

<button onclick="snake()">Snake</button>
<button onclick="clickGame()">Click</button>
<button onclick="guess()">Guess</button>
<button onclick="reaction()">Reaction</button>
<button onclick="catchBox()">Catch</button>
<button onclick="mathGame()">Math</button>
<button onclick="coin()">Coin</button>
<button onclick="dice()">Dice</button>
<button onclick="quiz()">Quiz</button>
<button onclick="race()">Race</button>

<div id="game"></div>

<script>

function snake(){
alert("🐍 Snake o‘yini keyinroq qo‘shiladi")
}

function clickGame(){
let score=0
document.getElementById("game").innerHTML=
"<button onclick='this.innerText=++score'>Click me</button>"
}

function guess(){
let n=Math.floor(Math.random()*10)+1
let g=prompt("1 dan 10 gacha son toping")
if(g==n) alert("🎉 To‘g‘ri topdingiz!")
else alert("❌ Xato. Son "+n)
}

function reaction(){
alert("3 sekunddan keyin OK ni bosing!")
setTimeout(()=>alert("Bos!"),3000)
}

function catchBox(){
document.getElementById("game").innerHTML=
"<button onclick='this.remove()'>Catch me!</button>"
}

function mathGame(){
let a=Math.floor(Math.random()*10)
let b=Math.floor(Math.random()*10)
let c=prompt(a+" + "+b+" = ?")
if(c==a+b) alert("To‘g‘ri")
else alert("Xato")
}

function coin(){
let r=Math.random()<0.5?"Heads":"Tails"
alert("Coin: "+r)
}

function dice(){
let r=Math.floor(Math.random()*6)+1
alert("🎲 Dice: "+r)
}

function quiz(){
let q=prompt("O‘zbekiston poytaxti?")
if(q.toLowerCase()=="toshkent")
alert("To‘g‘ri!")
else
alert("Xato")
}

function race(){
let score=0
document.getElementById("game").innerHTML=
"<button onclick='this.innerText=\"🚗 Speed \"+(++score)'>Drive</button>"
}

</script>

</body>
</html>
<script>
function openGame(game){
  if(game === "snake"){
    alert("Snake o'yini tez orada qo'shiladi 🐍");
  }
  if(game === "click"){
    let score = 0;
    while(confirm("Click Game! OK bosganingizda +1 ochko")){
      score++;
      alert("Sizning ochko: " + score);
    }
  }
  if(game === "guess"){
    let number = Math.floor(Math.random()*10)+1;
    let guess = prompt("1 dan 10 gacha son toping");
    if(guess == number){
      alert("To'g'ri topdingiz! 🎉");
    } else {
      alert("Xato! To'g'ri javob: " + number);
    }
  }
}
</script>
<button onclick="openGame('snake')">Snake</button>
<button onclick="openGame('click')">Click Game</button>
<button onclick="openGame('guess')">Guess Number</button>
